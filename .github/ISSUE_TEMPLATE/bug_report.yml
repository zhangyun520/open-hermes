name: Bug report
about: Report a bug in code, docs, tests, or project workflow.
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: textarea
    id: bug
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, pages, or inputs if relevant.
    validations:
      required: false
  - type: textarea
    id: risk
    attributes:
      label: Risk / privacy concerns
      description: Does this expose private data, secrets, public cache risk, or external side effects?
    validations:
      required: true
